spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${RDS_HOSTNAME}:${RDS_PORT}/${RDS_DB_NAME}
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
  jpa:
    database: postgresql
    show-sql: false
    hibernate:
      ddl-auto: update

encrypt:
  password: ${ENCRYPT_PASSWORD}

session:
  client-secret: ${SESSION_CLIENT_SECRET}
  access-token-expiration-time: 15
  refresh-token-expiration-time: 7

logging:
  level:
    root: INFO
    com.tourism: INFO
    org.hibernate: INFO
    org.springframework: INFO
  file:
    name: /var/log/tourism-app.log
    max-size: 10MB
    max-history: 10